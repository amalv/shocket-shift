name: Feature request
description: Propose a new gameplay, UX, or tooling improvement.
title: "feat: "
labels:
  - enhancement
body:
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: What should players or contributors be able to do?
      placeholder: Describe the feature or improvement.
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this worth doing now?
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Proposed scope
      description: Keep it concrete and incremental.
      placeholder: Outline the first sensible slice.
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Extra context
      description: References, sketches, audio ideas, or related issues.
